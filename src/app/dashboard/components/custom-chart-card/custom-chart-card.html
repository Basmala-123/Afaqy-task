<div class="row row-cols-1 row-cols-md-2 row-cols-xl-4 g-4" cdkDropList 
         cdkDropListOrientation="horizontal" 
         (cdkDropListDropped)="drop($event)">
  @for (chart of chartList; track chart.id) {
  <div class="col" cdkDrag>
    <div class="drag-placeholder" *cdkDragPlaceholder></div>
    <div class="card h-100 border-0 shadow-sm custom-card p-3">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <h6 class="fw-bold mb-0 text-dark">{{ chart.name }}</h6>
          <small class="text-muted fs-xs">
            Sensor: {{ chart.sensorType }} · {{ chart.totalRooms }} rooms
          </small>
        </div>
      </div>

      <div class="row align-items-center my-4">
        <div class="col-6 position-relative text-center">
          <canvas [id]="'chart-' + chart.id" style="max-height: 110px;"></canvas>
          <div class="chart-center-label">
            <span class="fw-bold d-block h5 m-0">{{ chart.totalRooms }}</span>
            <small class="text-muted fs-xxs">rooms</small>
          </div>
        </div>

        <div class="col-6 p-0">
          <div class="d-flex flex-column gap-2 pe-2">
            @for (stat of chart.liveStats; track stat.name) {
            <div class="d-flex justify-content-between fs-xs align-items-center">
              <small class="text-muted d-flex align-items-center gap-1">
                <span class="dot" [style.backgroundColor]="stat.color"></span>
                {{ stat.name }}
              </small>
              <span class="fw-bold text-dark">{{ stat.count }}</span>
            </div>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
  }

  <div class="col">
    <div
      class="card h-100 border-dashed add-chart-card d-flex align-items-center justify-content-center text-center p-4 cursor-pointer"
      (click)="onAddChartClick()">
      <div class="plus-icon mb-2">+</div>
      <h6 class="fw-bold text-dark">Add Custom Chart</h6>
      <p class="text-muted fs-xs px-2">Configure sensor, rooms & ranges</p>
    </div>
  </div>
</div>
